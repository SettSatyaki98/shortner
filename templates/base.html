<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Bitly — Shorten, manage, and track your links.{% endblock %}">
    <title>{% block title %}Bitly{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}">
</head>
<body>
    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(request, with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-msg {{ category }}" role="alert">
                    <span>{{ message }}</span>
                    <button type="button" class="flash-close" onclick="this.parentElement.remove()" aria-label="Close">&times;</button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
